# Builds and publishes platform installers on release tags.
# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rustydemon
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rustydemon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rustydemon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rustydemon.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux deps for egui/eframe
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rustydemon

      # Package the binary
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rustydemon dist/
          cd dist && tar czf ../rustydemon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz rustydemon

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rustydemon.exe dist/
          cd dist && 7z a ../rustydemon-${{ github.ref_name }}-${{ matrix.target }}.zip rustydemon.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustydemon-${{ matrix.target }}
          path: rustydemon-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rustydemon-*
